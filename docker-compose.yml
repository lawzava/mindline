services:
  mindline-signaling:
    build: .
    ports:
      - "9210:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # Production-safe tuning (required for remote E2E + soak behind shared NATs).
      - RATE_LIMIT_MESSAGES_PER_SECOND=50
      - RATE_LIMIT_CONNECTION_ATTEMPTS_PER_MINUTE=240
      - RATE_LIMIT_ROOM_JOINS_PER_MINUTE=30
    volumes:
      - ./logs:/app/logs
      - ./ssl:/app/ssl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
