name: Staging E2E

on:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: 'Run staging deploy commands before tests'
        required: false
        default: 'true'
      app_base_url:
        description: 'Staging app URL (optional override)'
        required: false
      signaling_health_url:
        description: 'Staging signaling health URL (optional override)'
        required: false
      signaling_ws_url:
        description: 'Staging signaling WebSocket URL for soak test (optional override)'
        required: false
  schedule:
    - cron: '0 9 * * *'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    env:
      STAGING_APP_DEPLOY_CMD: ${{ vars.STAGING_APP_DEPLOY_CMD }}
      STAGING_SIGNALING_DEPLOY_CMD: ${{ vars.STAGING_SIGNALING_DEPLOY_CMD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install

      - name: Build artifacts
        run: pnpm run verify:web

      - name: Deploy app
        if: (github.event_name == 'schedule' || github.event.inputs.run_deploy != 'false') && env.STAGING_APP_DEPLOY_CMD != ''
        run: bash -lc "${STAGING_APP_DEPLOY_CMD}"

      - name: Skip app deploy (command not configured)
        if: (github.event_name == 'schedule' || github.event.inputs.run_deploy != 'false') && env.STAGING_APP_DEPLOY_CMD == ''
        run: echo "Skipping app deploy because STAGING_APP_DEPLOY_CMD is not configured."

      - name: Deploy signaling
        if: (github.event_name == 'schedule' || github.event.inputs.run_deploy != 'false') && env.STAGING_SIGNALING_DEPLOY_CMD != ''
        run: bash -lc "${STAGING_SIGNALING_DEPLOY_CMD}"

      - name: Skip signaling deploy (command not configured)
        if: (github.event_name == 'schedule' || github.event.inputs.run_deploy != 'false') && env.STAGING_SIGNALING_DEPLOY_CMD == ''
        run: echo "Skipping signaling deploy because STAGING_SIGNALING_DEPLOY_CMD is not configured."

  required-remote-e2e:
    runs-on: ubuntu-latest
    needs: deploy-staging
    strategy:
      fail-fast: false
      matrix:
        project: ['Desktop Chrome', 'Mobile Safari', 'Mobile Chrome']
    env:
      APP_BASE_URL: ${{ github.event.inputs.app_base_url || vars.STAGING_APP_BASE_URL }}
      SIGNALING_HEALTH_URL: ${{ github.event.inputs.signaling_health_url || vars.STAGING_SIGNALING_HEALTH_URL }}
      E2E_STRICT_P2P: '1'
      SKIP_SIGNALING_START: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Validate staging URLs
        run: |
          test -n "${APP_BASE_URL}" || (echo "APP_BASE_URL is required" && exit 1)
          test -n "${SIGNALING_HEALTH_URL}" || (echo "SIGNALING_HEALTH_URL is required" && exit 1)

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run required remote E2E
        run: |
          bash scripts/test-e2e-with-signaling.sh \
            --project="${{ matrix.project }}" \
            tests/e2e/connection-status.spec.ts \
            tests/e2e/landing-page.spec.ts \
            tests/e2e/messaging.spec.ts \
            tests/e2e/required-persistence.spec.ts \
            tests/e2e/room-page.spec.ts \
            tests/e2e/required-p2p.spec.ts \
            tests/e2e/required-network.spec.ts

  signaling-soak:
    runs-on: ubuntu-latest
    needs: deploy-staging
    env:
      SIGNALING_HEALTH_URL: ${{ github.event.inputs.signaling_health_url || vars.STAGING_SIGNALING_HEALTH_URL }}
      SIGNALING_WS_URL_INPUT: ${{ github.event.inputs.signaling_ws_url || vars.STAGING_SIGNALING_WS_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install

      - name: Resolve WebSocket URL
        id: ws
        run: |
          if [ -n "${SIGNALING_WS_URL_INPUT}" ]; then
            echo "url=${SIGNALING_WS_URL_INPUT}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test -n "${SIGNALING_HEALTH_URL}" || (echo "SIGNALING_HEALTH_URL required if signaling_ws_url is unset" && exit 1)
          WS_URL="$(echo "${SIGNALING_HEALTH_URL}" | sed -e 's#^https://#wss://#' -e 's#^http://#ws://#' -e 's#/health$#/ws#')"
          echo "url=${WS_URL}" >> "$GITHUB_OUTPUT"

      - name: Run signaling soak test
        run: |
          pnpm run test:signaling:soak -- \
            --url=${{ steps.ws.outputs.url }} \
            --clients=120 \
            --rooms=12 \
            --durationSec=90 \
            --minJoinRate=0.9 \
            --minReceivedPerSent=0.9 \
            --maxSocketErrorRate=0.05 \
            --maxServerErrors=0

  best-effort-remote-e2e:
    runs-on: ubuntu-latest
    needs: required-remote-e2e
    continue-on-error: true
    env:
      APP_BASE_URL: ${{ github.event.inputs.app_base_url || vars.STAGING_APP_BASE_URL }}
      SIGNALING_HEALTH_URL: ${{ github.event.inputs.signaling_health_url || vars.STAGING_SIGNALING_HEALTH_URL }}
      SKIP_SIGNALING_START: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run best-effort remote E2E
        run: |
          bash scripts/test-e2e-with-signaling.sh \
            --project="Desktop Chrome" \
            tests/e2e/edit-delete.spec.ts \
            tests/e2e/mobile-p2p.spec.ts \
            tests/e2e/p2p-multiuser.spec.ts \
            tests/e2e/peer-list.spec.ts \
            tests/e2e/reactions.spec.ts \
            tests/e2e/typing-indicators.spec.ts
