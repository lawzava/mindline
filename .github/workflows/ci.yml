name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install Node dependencies
        run: pnpm install

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify Rust and web build
        run: pnpm run verify:rust && pnpm run verify:web

      - name: Run required E2E suite (blocking)
        run: pnpm run test:e2e:ci

      - name: Run best-effort E2E suite (non-blocking)
        continue-on-error: true
        run: bash scripts/test-e2e-with-signaling.sh --project='Desktop Chrome' tests/e2e/edit-delete.spec.ts tests/e2e/mobile-p2p.spec.ts tests/e2e/p2p-multiuser.spec.ts tests/e2e/peer-list.spec.ts tests/e2e/reactions.spec.ts tests/e2e/typing-indicators.spec.ts

      - name: Verify build artifacts
        run: |
          ls -la .svelte-kit/cloudflare/
          test -f .svelte-kit/cloudflare/_worker.js
