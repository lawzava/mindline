<!DOCTYPE html>
<html>
<head>
    <title>Room ID Validation Test</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .pass { background: #d4edda; }
        .fail { background: #f8d7da; }
        input { width: 300px; padding: 5px; }
        button { padding: 5px 10px; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>🧪 Room ID Validation Test</h1>

    <div>
        <input type="text" id="testInput" placeholder="Enter room ID to test" value="testroom">
        <button onclick="testRoomId()">Test Room ID</button>
    </div>

    <div id="results"></div>

    <script type="module">
        import init, * as wasm from '../pkg/mindline.js';

        let wasmLoaded = false;

        try {
            await init();
            wasmLoaded = true;
            log('✅ WASM module loaded successfully');

            // Test immediately with default value
            testRoomId();
        } catch (error) {
            log('❌ WASM module failed to load: ' + error.message);
        }

        window.testRoomId = function() {
            const input = document.getElementById('testInput').value;
            log(`\n🔍 Testing Room ID: "${input}"`);

            if (!wasmLoaded) {
                log('❌ WASM not loaded');
                return;
            }

            try {
                // Test the WASM function directly
                const result = wasm.validate_room_id(input);

                log(`📤 Input: "${input}" (length: ${input.length})`);
                log(`📥 Result: "${result}" (type: ${typeof result}, length: ${result ? result.length : 'N/A'})`);

                if (typeof result === 'string') {
                    if (result.length > 0) {
                        addResult(`✅ PASS: "${input}" → "${result}"`, 'pass');
                    } else {
                        addResult(`❌ FAIL: "${input}" → empty string`, 'fail');
                    }
                } else {
                    addResult(`❌ FAIL: "${input}" → wrong type: ${typeof result}`, 'fail');
                    log(`🔍 Raw result:`, result);
                }

            } catch (error) {
                addResult(`❌ ERROR: "${input}" → ${error.message}`, 'fail');
                log('🔍 Full error:', error);
            }
        };

        function log(message, obj = null) {
            console.log(message, obj || '');
            const results = document.getElementById('results');
            results.innerHTML += `<div>${message}</div>`;
            if (obj) {
                results.innerHTML += `<div>🔍 ${JSON.stringify(obj)}</div>`;
            }
        }

        function addResult(message, type) {
            const results = document.getElementById('results');
            results.innerHTML += `<div class="test ${type}">${message}</div>`;
        }

        // Test cases
        const testCases = [
            'testroom',
            'room-123',
            'cd87b151-0660-4b20-84fb-f2a36d2e12d1',
            'MyRoom',
            'ab',
            '',
            'invalid<script>',
            'room with spaces'
        ];

        // Auto-test all cases
        setTimeout(() => {
            testCases.forEach(testCase => {
                document.getElementById('testInput').value = testCase;
                testRoomId();
            });
        }, 500);
    </script>
</body>
</html>
