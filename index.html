<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindline - Secure P2P Real Time Chat</title>
    <link rel="stylesheet" href="./styles.css">
    <!-- Import Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MINDLINE</h1>
            <p class="subtitle">Secure Peer-to-Peer Real Time Chat</p>
        </div>
        
        <div class="card user-setup">
            <div class="card-header">
                <h2>USER SETUP</h2>
            </div>
            <div class="card-content">
                <div class="input-group">
                    <label for="userName">Your Name</label>
                    <input type="text" id="userName" placeholder="Enter your name" value="Test User">
                </div>
                <button id="initializeBtn" class="btn btn-primary">Initialize</button>
                <div class="user-info">
                    <span class="label">User ID:</span>
                    <span id="userId" class="value">Not initialized</span>
                </div>
            </div>
        </div>
        
        <div class="card room-management">
            <div class="card-header">
                <h2>ROOM MANAGEMENT</h2>
            </div>
            <div class="card-content">
                <div class="room-controls">
                    <div class="input-group">
                        <label for="roomIdInput">Room ID</label>
                        <input type="text" id="roomIdInput" placeholder="Enter room ID (at least 8 chars)">
                        <p class="input-hint">Room ID can be any alphanumeric string (with dashes/underscores) of at least 8 characters</p>
                    </div>
                    <div class="button-group">
                        <button id="createRoomBtn" class="btn btn-primary">Create Room</button>
                        <button id="joinRoomBtn" class="btn btn-secondary">Join Room</button>
                    </div>
                </div>
                <div class="room-info">
                    <div class="room-status">
                        <span class="label">Current Room:</span>
                        <span id="currentRoom" class="room-id">None</span>
                    </div>
                    <div id="connectionStatus" class="status status-disconnected">Disconnected</div>
                </div>
            </div>
        </div>
        
        <div class="card chat">
            <div class="card-header">
                <h2>CHAT</h2>
            </div>
            <div class="card-content">
                <div class="chat-area" id="chatArea">
                    <!-- Messages will be inserted here -->
                    <div class="typing-indicator" id="typingIndicator">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
                
                <div class="message-input">
                    <input type="text" id="messageInput" placeholder="Type your message...">
                    <button id="sendBtn" class="btn btn-primary">Send</button>
                </div>
            </div>
        </div>
        
        <div class="card debug">
            <div class="card-header">
                <h2>DEBUG</h2>
                <button id="clearLogBtn" class="btn btn-small">Clear</button>
            </div>
            <pre id="debugOutput" class="debug-output">Waiting for WASM module to load...</pre>
        </div>
    </div>
    
    <script src="./index.js"></script>
</body>
</html>
