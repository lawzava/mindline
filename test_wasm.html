<!DOCTYPE html>
<html>
<head>
    <title>WASM Validation Test</title>
</head>
<body>
    <h1>WASM Validation Test</h1>
    <div>
        <input type="text" id="roomInput" placeholder="Test room ID" value="testroom">
        <button onclick="testRoom()">Test Room ID</button>
    </div>
    <div>
        <input type="text" id="usernameInput" placeholder="Test username" value="TestUser">
        <button onclick="testUsername()">Test Username</button>
    </div>
    <div>
        <input type="text" id="messageInput" placeholder="Test message" value="Hello world">
        <button onclick="testMessage()">Test Message</button>
    </div>
    <div id="results"></div>

    <script type="module">
        import init, * as wasm from './pkg/mindline.js';

        await init();
        console.log('✅ WASM loaded');

        window.testRoom = function() {
            const input = document.getElementById('roomInput').value;
            try {
                const result = wasm.validate_room_id(input);
                log(`Room ID: "${input}" → "${result}" (${typeof result})`);
            } catch (error) {
                log(`Room ID: "${input}" → ERROR: ${error.message}`);
            }
        };

        window.testUsername = function() {
            const input = document.getElementById('usernameInput').value;
            try {
                const result = wasm.validate_username(input);
                log(`Username: "${input}" → "${result}" (${typeof result})`);
            } catch (error) {
                log(`Username: "${input}" → ERROR: ${error.message}`);
            }
        };

        window.testMessage = function() {
            const input = document.getElementById('messageInput').value;
            try {
                const result = wasm.validate_message(input);
                log(`Message: "${input}" → "${result}" (${typeof result})`);
            } catch (error) {
                log(`Message: "${input}" → ERROR: ${error.message}`);
            }
        };

        function log(message) {
            const results = document.getElementById('results');
            results.innerHTML += `<div>${message}</div>`;
            console.log(message);
        }

        // Auto-test on load
        setTimeout(() => {
            testRoom();
            testUsername();
            testMessage();
        }, 100);
    </script>
</body>
</html>
