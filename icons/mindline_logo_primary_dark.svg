<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 1024 256" role="img" aria-label="Mindline logo">
  <title>Mindline — secure p2p chat logo</title>
  <rect width="100%" height="100%" fill="transparent"/>
  <g transform="translate(32,64)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Icon -->
    <polygon points="112.000,64.000 88.000,105.569 40.000,105.569 16.000,64.000 40.000,22.431 88.000,22.431" stroke="#ECEFF4" stroke-width="4" fill="none"/>
    <line x1="47" y1="55" x2="81" y2="73" stroke="#8FBCBB" stroke-width="4"/>
    <circle cx="47" cy="55" r="4" fill="#ECEFF4" stroke="none"/>
    <circle cx="81" cy="73" r="4" fill="#ECEFF4" stroke="none"/>
    <path d="M 83.200 84.784 l 6 6.8" stroke="#ECEFF4" stroke-width="4"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(200,138)">
    <text x="0" y="0" font-family="Inter, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="600" letter-spacing="0.5" fill="#ECEFF4">Mind</text>
    <text x="326" y="0" font-family="Inter, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="600" letter-spacing="0.5" fill="#8FBCBB">line</text>
    <!-- subtle baseline 'line' underline suggesting real-time link -->
    <line x1="326" y1="12" x2="600" y2="12" stroke="#8FBCBB" stroke-width="4" stroke-linecap="round" />
