<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5E81AC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81A1C1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#gradient)" stroke="#000" stroke-width="8"/>

  <!-- Chat bubbles -->
  <g fill="white" stroke="#000" stroke-width="4">
    <!-- Main chat bubble -->
    <rect x="80" y="120" width="280" height="120" rx="20" ry="20"/>

    <!-- Response bubble -->
    <rect x="152" y="280" width="280" height="120" rx="20" ry="20"/>

    <!-- Typing indicator dots -->
    <circle cx="120" cy="180" r="12"/>
    <circle cx="160" cy="180" r="12"/>
    <circle cx="200" cy="180" r="12"/>

    <!-- P2P connection lines -->
    <line x1="120" y1="340" x2="392" y2="340" stroke-width="6" stroke="#BF616A"/>
    <line x1="120" y1="360" x2="392" y2="360" stroke-width="6" stroke="#A3BE8C"/>
  </g>

  <!-- Security lock icon -->
  <g fill="#EBCB8B" stroke="#000" stroke-width="3">
    <rect x="220" y="60" width="72" height="40" rx="8" ry="8"/>
    <path d="M240 60 V40 Q240 20 256 20 Q272 20 272 40 V60" fill="none"/>
  </g>

  <!-- Live indicator -->
  <circle cx="460" cy="60" r="20" fill="#BF616A" stroke="#000" stroke-width="3"/>
  <text x="460" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">LIVE</text>
</svg>