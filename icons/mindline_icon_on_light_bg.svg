<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Mindline icon">
  <rect width="100%" height="100%" fill="#ECEFF4"/>

  <title>Mindline — secure p2p chat icon</title>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Security: hexagonal perimeter -->
    <polygon points="448.000,256.000 352.000,422.277 160.000,422.277 64.000,256.000 160.000,89.723 352.000,89.723" stroke="#88C0D0" stroke-width="24.064" fill="none"/>
    <!-- Connection: encrypted link between peers -->
    <line x1="186.88" y1="218.624" x2="325.12" y2="293.376" stroke="#8FBCBB" stroke-width="24.064"/>
    <!-- Peers: two nodes -->
    <circle cx="186.88" cy="218.624" r="24.064" fill="#88C0D0" stroke="none"/>
    <circle cx="325.12" cy="293.376" r="24.064" fill="#88C0D0" stroke="none"/>
    <!-- Subtle chat cue: notch (tail) as a tiny gap on lower edge -->
    <path d="M 332.800 339.136 l 34.304 38.592" stroke="#88C0D0" stroke-width="24.064"/>
  </g>
</svg>